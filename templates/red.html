<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oops! Weather Error</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #334155;
        }
        .error-card {
            background: white;
            padding: 50px 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
            width: 350px;
            border-top: 5px solid #ef4444; /* Red accent for error */
        }
        .icon {
            font-size: 4em;
            margin-bottom: 10px;
        }
        .title {
            font-size: 1.5em;
            font-weight: bold;
            margin-bottom: 15px;
            color: #1e293b;
        }
        .message {
            color: #000000;
            font-weight: bold;
            font-size: 0.95em;
            line-height: 1.5;
            margin-bottom: 30px;
        }
        .btn-retry {
            background-color: #3b82f6;
            color: white;
            text-decoration: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-weight: 600;
            transition: background-color 0.2s ease;
            display: inline-block;
        }
        .btn-retry:hover {
            background-color: #2563eb;
            align-items: center;
        }
        .material-symbols-outlined {
            font-size: 28px;
            color: #f0f4f8;
            align-content: center; /* Default is usually 24px. Increase this number! */
        }
    </style>
</head>
<body>

    <div class="error-card">
        <div class="icon">🌩️</div>
        <div class="title">Weather Unavailable</div>
        
        <div class="message">{{ error_code.message }}</div>
        
        <a href="/" class="btn-retry"><span class="material-symbols-outlined">refresh</span></a>
    </div>
    
</body>
</html>
